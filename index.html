<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Restore N Perform — CARs</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a2e;--bg2:#16213e;--accent:#16c79a;--accent2:#0f9b7a;
  --red:#e74c3c;--orange:#f39c12;--yellow:#f1c40f;--blue:#3498db;
  --text:#f0f0f0;--text2:#8892a4;--radius:12px;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text)}
body{display:flex;flex-direction:column}

/* ─── Header ─── */
.header{padding:12px 16px;display:flex;align-items:center;gap:10px;background:var(--bg2);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.header .brand{font-size:14px;font-weight:600;letter-spacing:.5px;color:var(--accent);flex:1}
.header .back-btn{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:4px 8px;display:none}
.header .back-btn.show{display:block}

/* ─── Screens ─── */
.screen{display:none;flex:1;overflow-y:auto;overflow-x:hidden;position:relative}
.screen.active{display:flex;flex-direction:column}

/* ─── Home ─── */
.home-screen{padding:20px 16px;gap:16px}
.home-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:4px}
.home-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:8px}
.full-assess-btn{background:var(--accent);color:#000;font-weight:700;font-size:15px;padding:14px;border:none;border-radius:var(--radius);cursor:pointer;width:100%;margin-bottom:8px}
.joint-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.joint-card{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:16px 12px;cursor:pointer;text-align:center;position:relative;transition:transform .15s,border-color .15s}
.joint-card:active{transform:scale(.96)}
.joint-card .indicator{width:8px;height:8px;border-radius:50%;position:absolute;top:10px;right:10px;background:#555}
.joint-card .indicator.green{background:#2ecc71}
.joint-card .indicator.yellow{background:var(--yellow)}
.joint-card .indicator.red{background:var(--red)}
.joint-card .icon{font-size:28px;margin-bottom:6px}
.joint-card .name{font-size:13px;font-weight:600}
.joint-card.coming-soon{opacity:.45}

/* ─── Exercise Screen ─── */
.exercise-screen{padding:0;gap:0;overflow:hidden}
.svg-container{flex:1;display:flex;align-items:center;justify-content:center;position:relative;min-height:0;overflow:hidden}
.svg-container svg{width:100%;height:100%;max-height:100%}
.cue-overlay{position:absolute;bottom:12px;left:16px;right:16px;text-align:center;font-size:13px;color:var(--accent);opacity:0;transition:opacity .4s;pointer-events:none;text-shadow:0 1px 4px rgba(0,0,0,.6)}
.cue-overlay.show{opacity:1}
.phase-label{position:absolute;top:10px;left:16px;right:16px;text-align:center;font-size:12px;color:var(--text2);opacity:.7}

/* ─── Controls ─── */
.controls{flex-shrink:0;background:var(--bg2);border-top:1px solid rgba(255,255,255,.06);padding:12px 16px 24px}
.slider-row{position:relative;margin-bottom:10px;padding:0 4px}
.slider-track{position:relative;height:40px;display:flex;align-items:center}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;background:rgba(255,255,255,.12);border-radius:3px;outline:none;position:relative;z-index:2}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3)}
input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid #fff}
.markers-layer{position:absolute;top:0;left:12px;right:12px;height:40px;pointer-events:none;z-index:1}
.marker-dot{position:absolute;width:12px;height:12px;border-radius:50%;top:14px;transform:translateX(-50%);pointer-events:auto;cursor:pointer;border:2px solid rgba(255,255,255,.4);z-index:3;transition:transform .15s}
.marker-dot:active{transform:translateX(-50%) scale(1.3)}
.marker-dot.pain{background:var(--red)}
.marker-dot.restriction{background:var(--orange)}
.marker-dot.clicking{background:var(--yellow)}
.marker-dot.weakness{background:var(--blue)}
.marker-dot.unclassified{background:#888}

.btn-row{display:flex;gap:8px;align-items:center}
.ctrl-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:var(--text);border-radius:10px;padding:10px 14px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s}
.ctrl-btn:active{background:rgba(255,255,255,.15)}
.ctrl-btn.play{flex:0 0 48px;justify-content:center}
.ctrl-btn.speed{font-size:12px;padding:8px 12px}
.ctrl-btn.speed.active{background:var(--accent);color:#000;border-color:var(--accent)}
.mark-btn{background:var(--red);border:none;color:#fff;font-weight:700;font-size:15px;padding:10px 20px;border-radius:10px;cursor:pointer;margin-left:auto;display:flex;align-items:center;gap:6px;transition:transform .1s}
.mark-btn:active{transform:scale(.93)}
.summary-btn{background:var(--accent);border:none;color:#000;font-weight:700;font-size:13px;padding:10px 16px;border-radius:10px;cursor:pointer}

/* ─── Marker classify popup ─── */
.classify-popup{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:2px solid var(--accent);padding:20px 16px 32px;z-index:100;transform:translateY(100%);transition:transform .25s ease;border-radius:16px 16px 0 0}
.classify-popup.show{transform:translateY(0)}
.classify-popup h3{font-size:15px;margin-bottom:12px;text-align:center}
.classify-options{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.classify-opt{padding:14px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;color:#fff}
.classify-opt.pain{background:var(--red)}
.classify-opt.restriction{background:var(--orange)}
.classify-opt.clicking{background:var(--yellow);color:#000}
.classify-opt.weakness{background:var(--blue)}
.classify-opt.other{background:#666}
.classify-opt.delete{background:#333;border:1px solid var(--red);color:var(--red)}
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;display:none}
.popup-overlay.show{display:block}

/* ─── Summary Screen ─── */
.summary-screen{padding:20px 16px;gap:16px}
.summary-circle-wrap{width:220px;height:220px;margin:0 auto;position:relative}
.summary-circle-wrap svg{width:100%;height:100%}
.summary-markers-list{display:flex;flex-direction:column;gap:10px}
.summary-marker-item{background:var(--bg2);border-radius:var(--radius);padding:14px;border-left:4px solid #555}
.summary-marker-item.pain{border-left-color:var(--red)}
.summary-marker-item.restriction{border-left-color:var(--orange)}
.summary-marker-item.clicking{border-left-color:var(--yellow)}
.summary-marker-item.weakness{border-left-color:var(--blue)}
.summary-marker-item .pos{font-size:13px;font-weight:600;margin-bottom:4px}
.summary-marker-item .type{font-size:12px;color:var(--text2);text-transform:capitalize}
.summary-marker-item .exercise{font-size:12px;color:var(--accent);margin-top:6px;font-style:italic}
.summary-actions{display:flex;gap:10px;margin-top:8px}
.save-btn{background:var(--accent);color:#000;border:none;font-weight:700;font-size:15px;padding:14px;border-radius:var(--radius);cursor:pointer;flex:1}
.clear-btn{background:rgba(255,255,255,.08);color:var(--text);border:1px solid rgba(255,255,255,.1);font-weight:600;font-size:15px;padding:14px;border-radius:var(--radius);cursor:pointer;flex:1}

/* ─── Legend ─── */
.legend{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;font-size:11px;color:var(--text2)}
.legend span::before{content:'';display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
.legend .l-pain::before{background:var(--red)}
.legend .l-restriction::before{background:var(--orange)}
.legend .l-clicking::before{background:var(--yellow)}
.legend .l-weakness::before{background:var(--blue)}

/* ─── History Screen ─── */
.history-screen{padding:20px 16px;gap:12px}
.history-item{background:var(--bg2);border-radius:var(--radius);padding:14px;display:flex;justify-content:space-between;align-items:center}
.history-item .hi-joint{font-weight:600;font-size:14px}
.history-item .hi-date{font-size:12px;color:var(--text2)}
.history-item .hi-count{font-size:12px;color:var(--accent)}
.no-history{text-align:center;color:var(--text2);font-size:14px;margin-top:40px}

/* ─── Nav ─── */
.nav{display:flex;background:var(--bg2);border-top:1px solid rgba(255,255,255,.06);flex-shrink:0;padding:8px 0 env(safe-area-inset-bottom,8px)}
.nav-btn{flex:1;background:none;border:none;color:var(--text2);font-size:11px;padding:6px 0;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:22px;height:22px}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <button class="back-btn" id="backBtn" onclick="goBack()">←</button>
  <div class="brand">RESTORE N PERFORM</div>
</div>

<!-- Home Screen -->
<div class="screen home-screen active" id="homeScreen">
  <div class="home-title">CARs Assessment</div>
  <div class="home-sub">Controlled Articular Rotations</div>
  <button class="full-assess-btn" onclick="startFullAssessment()">Full Assessment →</button>
  <div class="joint-grid" id="jointGrid"></div>
</div>

<!-- Exercise Screen -->
<div class="screen exercise-screen" id="exerciseScreen">
  <div class="svg-container" id="svgContainer">
    <div class="phase-label" id="phaseLabel"></div>
    <div class="cue-overlay" id="cueOverlay"></div>
  </div>
  <div class="controls">
    <div class="slider-row">
      <div class="slider-track">
        <div class="markers-layer" id="markersLayer"></div>
        <input type="range" id="slider" min="0" max="100" value="0" step="0.5">
      </div>
    </div>
    <div class="btn-row">
      <button class="ctrl-btn play" id="playBtn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn speed" id="speedBtn" onclick="toggleSpeed()">1×</button>
      <button class="mark-btn" onclick="addMarker()">● Mark</button>
      <button class="summary-btn" id="summaryBtn" onclick="showSummary()" style="display:none">Summary</button>
    </div>
  </div>
</div>

<!-- Summary Screen -->
<div class="screen summary-screen" id="summaryScreen">
  <div style="font-size:18px;font-weight:700;text-align:center" id="summaryTitle"></div>
  <div class="legend">
    <span class="l-pain">Pain</span>
    <span class="l-restriction">Restriction</span>
    <span class="l-clicking">Clicking</span>
    <span class="l-weakness">Weakness</span>
  </div>
  <div class="summary-circle-wrap" id="summaryCircle"></div>
  <div class="summary-markers-list" id="summaryList"></div>
  <div class="summary-actions">
    <button class="clear-btn" onclick="clearMarkers()">Clear All</button>
    <button class="save-btn" onclick="saveAssessment()">Save Assessment</button>
  </div>
</div>

<!-- History Screen -->
<div class="screen history-screen" id="historyScreen">
  <div style="font-size:18px;font-weight:700;text-align:center">Assessment History</div>
  <div id="historyList"></div>
</div>

<!-- Classify popup -->
<div class="popup-overlay" id="popupOverlay" onclick="closeClassify()"></div>
<div class="classify-popup" id="classifyPopup">
  <h3>Classify this marker</h3>
  <div class="classify-options">
    <button class="classify-opt pain" onclick="classifyMarker('pain')">Pain</button>
    <button class="classify-opt restriction" onclick="classifyMarker('restriction')">Restriction</button>
    <button class="classify-opt clicking" onclick="classifyMarker('clicking')">Clicking</button>
    <button class="classify-opt weakness" onclick="classifyMarker('weakness')">Weakness</button>
    <button class="classify-opt other" onclick="classifyMarker('other')">Other</button>
    <button class="classify-opt delete" onclick="classifyMarker('delete')">Delete</button>
  </div>
</div>

<!-- Nav -->
<div class="nav">
  <button class="nav-btn active" onclick="showScreen('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>
    <span>Home</span>
  </button>
  <button class="nav-btn" onclick="showScreen('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    <span>History</span>
  </button>
</div>

<script>
// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let currentJoint = null;
let currentMarkers = [];
let classifyingIdx = -1;
let isPlaying = false;
let playSpeed = 1;
let playRAF = null;
let playStart = null;
let playFrom = 0;
let fullAssessmentMode = false;
let fullAssessmentIdx = 0;

const PLAY_DURATION_MS = 25000; // 25s at 1x

const JOINTS = [
  {id:'neck',name:'Neck',icon:'🔄',hasAnim:true},
  {id:'shoulder_r',name:'Shoulder (R)',icon:'💪',hasAnim:true},
  {id:'shoulder_l',name:'Shoulder (L)',icon:'💪',hasAnim:true},
  {id:'thoracic',name:'Thoracic',icon:'🔃',hasAnim:false},
  {id:'lumbar',name:'Lumbar',icon:'🔃',hasAnim:false},
  {id:'hip_r',name:'Hip (R)',icon:'🦵',hasAnim:false},
  {id:'hip_l',name:'Hip (L)',icon:'🦵',hasAnim:false},
  {id:'knee_r',name:'Knee (R)',icon:'🦿',hasAnim:false},
  {id:'knee_l',name:'Knee (L)',icon:'🦿',hasAnim:false},
  {id:'elbow_r',name:'Elbow (R)',icon:'💪',hasAnim:false},
  {id:'elbow_l',name:'Elbow (L)',icon:'💪',hasAnim:false},
  {id:'wrist_r',name:'Wrist (R)',icon:'✋',hasAnim:false},
  {id:'wrist_l',name:'Wrist (L)',icon:'✋',hasAnim:false},
  {id:'ankle_r',name:'Ankle (R)',icon:'🦶',hasAnim:false},
  {id:'ankle_l',name:'Ankle (L)',icon:'🦶',hasAnim:false},
];

const FULL_ORDER = JOINTS.map(j=>j.id);

// ═══════════════════════════════════════════════════
// JOINT GRID
// ═══════════════════════════════════════════════════
function buildGrid(){
  const g=document.getElementById('jointGrid');
  g.innerHTML='';
  JOINTS.forEach(j=>{
    const d=document.createElement('div');
    d.className='joint-card'+(j.hasAnim?'':' coming-soon');
    const status=getJointStatus(j.id);
    d.innerHTML=`<div class="indicator ${status}"></div><div class="icon">${j.icon}</div><div class="name">${j.name}${j.hasAnim?'':'<br><small style="color:var(--text2);font-weight:400">Coming Soon</small>'}</div>`;
    d.onclick=()=>{if(j.hasAnim)openJoint(j.id)};
    g.appendChild(d);
  });
}

function getJointStatus(id){
  try{
    const h=JSON.parse(localStorage.getItem('cars_history')||'[]');
    const latest=h.filter(x=>x.joint===id).sort((a,b)=>b.ts-a.ts)[0];
    if(!latest)return'';
    const n=latest.markers.length;
    const hasPain=latest.markers.some(m=>m.type==='pain');
    if(n===0)return'green';
    if(hasPain||n>=3)return'red';
    return'yellow';
  }catch(e){return''}
}

// ═══════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════
let screenStack=['home'];

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const map={home:'homeScreen',exercise:'exerciseScreen',summary:'summaryScreen',history:'historyScreen'};
  document.getElementById(map[name]).classList.add('active');
  document.getElementById('backBtn').classList.toggle('show',name!=='home');
  if(name==='home'){screenStack=['home'];buildGrid();document.querySelectorAll('.nav-btn')[0].classList.add('active')}
  if(name==='history'){loadHistory();document.querySelectorAll('.nav-btn')[1].classList.add('active')}
  if(name!=='exercise')stopPlay();
}

function goBack(){
  if(screenStack.length>1){screenStack.pop();showScreen(screenStack[screenStack.length-1])}
  else showScreen('home');
  fullAssessmentMode=false;
}

function openJoint(id){
  currentJoint=id;
  currentMarkers=loadMarkers(id);
  showScreen('exercise');
  screenStack.push('exercise');
  document.getElementById('slider').value=0;
  renderSVG(id);
  updateFigure(0);
  renderMarkerDots();
  updateSummaryBtnVisibility();
}

// ═══════════════════════════════════════════════════
// FULL ASSESSMENT
// ═══════════════════════════════════════════════════
function startFullAssessment(){
  const available=JOINTS.filter(j=>j.hasAnim);
  if(!available.length)return;
  fullAssessmentMode=true;
  fullAssessmentIdx=0;
  openJoint(available[0].id);
}

// ═══════════════════════════════════════════════════
// SVG STICK FIGURE RENDERING
// ═══════════════════════════════════════════════════
function renderSVG(jointId){
  const c=document.getElementById('svgContainer');
  // Remove old SVG
  const old=c.querySelector('svg');
  if(old)old.remove();
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 300 400');
  svg.setAttribute('preserveAspectRatio','xMidYMid meet');
  svg.id='figureSvg';
  // Draw static body parts as groups
  svg.innerHTML=`
    <defs>
      <filter id="glow"><feGaussianBlur stdDeviation="2" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <g id="figureGroup" filter="url(#glow)">
      <!-- torso -->
      <line id="torso" x1="150" y1="120" x2="150" y2="230" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round"/>
      <!-- spine to hips -->
      <line id="hipBar" x1="120" y1="230" x2="180" y2="230" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round"/>
      <!-- shoulder bar -->
      <line id="shoulderBar" x1="110" y1="140" x2="190" y2="140" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round"/>
      <!-- left leg -->
      <line id="legLU" x1="120" y1="230" x2="120" y2="310" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
      <line id="legLL" x1="120" y1="310" x2="120" y2="380" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
      <!-- right leg -->
      <line id="legRU" x1="180" y1="230" x2="180" y2="310" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
      <line id="legRL" x1="180" y1="310" x2="180" y2="380" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
      <!-- left arm -->
      <line id="armLU" x1="110" y1="140" x2="90" y2="200" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
      <line id="armLL" x1="90" y1="200" x2="80" y2="260" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
      <!-- right arm -->
      <line id="armRU" x1="190" y1="140" x2="210" y2="200" stroke="#16c79a" stroke-width="2.5" stroke-linecap="round"/>
      <line id="armRL" x1="210" y1="200" x2="220" y2="260" stroke="#16c79a" stroke-width="2.5" stroke-linecap="round"/>
      <!-- neck -->
      <line id="neckLine" x1="150" y1="120" x2="150" y2="95" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round"/>
      <!-- head -->
      <circle id="head" cx="150" cy="80" r="18" fill="none" stroke="#e0e0e0" stroke-width="2.5"/>
      <!-- joint dots -->
      <circle id="dotSR" cx="190" cy="140" r="5" fill="var(--accent)" opacity=".8"/>
      <circle id="dotSL" cx="110" cy="140" r="5" fill="#888" opacity=".4"/>
      <circle id="dotNeck" cx="150" cy="100" r="4" fill="#888" opacity=".4"/>
    </g>
  `;
  c.insertBefore(svg,c.firstChild);
  // Highlight the active joint
  if(jointId==='neck'){
    svg.querySelector('#dotNeck').setAttribute('fill','var(--accent)');
    svg.querySelector('#dotNeck').setAttribute('opacity','1');
    svg.querySelector('#dotSR').setAttribute('fill','#888');
    svg.querySelector('#dotSR').setAttribute('opacity','.4');
    svg.querySelector('#armRU').setAttribute('stroke','#e0e0e0');
    svg.querySelector('#armRL').setAttribute('stroke','#e0e0e0');
    svg.querySelector('#neckLine').setAttribute('stroke','#16c79a');
    svg.querySelector('#head').setAttribute('stroke','#16c79a');
  }
  if(jointId==='shoulder_l'){
    svg.querySelector('#dotSR').setAttribute('fill','#888');svg.querySelector('#dotSR').setAttribute('opacity','.4');
    svg.querySelector('#dotSL').setAttribute('fill','var(--accent)');svg.querySelector('#dotSL').setAttribute('opacity','1');
    svg.querySelector('#armRU').setAttribute('stroke','#e0e0e0');
    svg.querySelector('#armRL').setAttribute('stroke','#e0e0e0');
    svg.querySelector('#armLU').setAttribute('stroke','#16c79a');
    svg.querySelector('#armLL').setAttribute('stroke','#16c79a');
  }
}

// ═══════════════════════════════════════════════════
// ANIMATION KEYFRAMES
// ═══════════════════════════════════════════════════

// Neck CAR keyframes: head position (cx,cy offsets from neutral) and neck end
// pct → {hx,hy} offset of head center from default (150,80), neckEnd offset
// The neck line goes from (150,120) to neckTop, head center is above neckTop
const NECK_KF = [
  // Neutral
  {p:0,   hx:0,  hy:0,  ntx:0, nty:0, cue:'', phase:'Neutral'},
  // Chin drops to collarbone (flexion)
  {p:8,   hx:0,  hy:18, ntx:0, nty:12, cue:'Tuck chin to chest', phase:'Flexion'},
  // Chin drags right along collarbone
  {p:16,  hx:18, hy:16, ntx:10,nty:10, cue:'Keep chin in contact with collarbone', phase:'Right lateral flexion'},
  {p:24,  hx:30, hy:8,  ntx:18,nty:5,  cue:'', phase:'Right lateral flexion'},
  // Right ear over right shoulder
  {p:32,  hx:32, hy:0,  ntx:20,nty:0,  cue:'No shoulder hiking', phase:'Right ear to shoulder'},
  // Extension — head rolls back
  {p:40,  hx:22, hy:-12,ntx:12,nty:-8, cue:'', phase:'Extension (right)'},
  {p:50,  hx:0,  hy:-18,ntx:0, nty:-12,cue:'No slack jaw', phase:'Full extension'},
  // Continue to left side
  {p:58,  hx:-22,hy:-12,ntx:-12,nty:-8, cue:'', phase:'Extension (left)'},
  // Left ear over left shoulder
  {p:66,  hx:-32,hy:0,  ntx:-20,nty:0,  cue:'No shoulder hiking', phase:'Left ear to shoulder'},
  // Chin drags left collarbone back
  {p:74,  hx:-30,hy:8,  ntx:-18,nty:5,  cue:'', phase:'Left lateral flexion'},
  {p:82,  hx:-18,hy:16, ntx:-10,nty:10, cue:'Keep chin in contact with collarbone', phase:'Left lateral flexion'},
  // Chin to center flexion
  {p:90,  hx:0,  hy:18, ntx:0, nty:12, cue:'', phase:'Return flexion'},
  // Back to neutral
  {p:100, hx:0,  hy:0,  ntx:0, nty:0, cue:'', phase:'Neutral (complete)'},
];

// Shoulder CAR keyframes (right shoulder)
// We track right shoulder→elbow→hand positions
// Base: shoulder at (190,140), neutral arm hangs to ~(210,200)→(220,260)
const SHOULDER_R_KF = [
  // Neutral: arm at side
  {p:0,   ex:210,ey:200, wx:220,wy:260, cue:'', phase:'Neutral — arm at side'},
  // External rotation — palm opens out
  {p:6,   ex:215,ey:195, wx:235,wy:250, cue:'Turn palm outward — external rotation', phase:'External rotation'},
  // Swing externally rotated arm across front low
  {p:14,  ex:175,ey:200, wx:160,wy:255, cue:'Swing across front of body', phase:'Cross-body (low)'},
  {p:22,  ex:140,ey:185, wx:115,wy:230, cue:'Focus on rotation AT the shoulder', phase:'Cross-body'},
  // Scoop up toward overhead
  {p:30,  ex:130,ey:160, wx:110,wy:190, cue:'', phase:'Scooping upward'},
  {p:38,  ex:140,ey:130, wx:125,wy:140, cue:'No wrist or elbow involvement', phase:'Rising'},
  // Overhead
  {p:46,  ex:170,ey:95,  wx:175,wy:65,  cue:'Maintain rotation as long as possible', phase:'Overhead'},
  {p:50,  ex:185,ey:85,  wx:188,wy:55,  cue:'', phase:'Top — switch to internal rotation'},
  // Internal rotation, arm comes down behind
  {p:56,  ex:200,ey:95,  wx:210,wy:65,  cue:'Reverse to internal rotation', phase:'Internal rotation begins'},
  {p:62,  ex:215,ey:120, wx:230,wy:100, cue:'', phase:'Descending behind'},
  {p:68,  ex:225,ey:160, wx:245,wy:145, cue:'Backstroke motion', phase:'Behind body'},
  {p:74,  ex:220,ey:200, wx:235,wy:210, cue:'Add internal rotation as available', phase:'Behind — low'},
  {p:80,  ex:210,ey:230, wx:215,wy:255, cue:'', phase:'Near glute'},
  // Max internal rotation, swing back
  {p:86,  ex:215,ey:215, wx:225,wy:245, cue:'Maximally internally rotate', phase:'Max internal rotation'},
  // Swing back behind
  {p:92,  ex:220,ey:200, wx:235,wy:220, cue:'Externally rotate and return', phase:'Returning'},
  // Come across front back to neutral
  {p:96,  ex:215,ey:200, wx:225,wy:255, cue:'', phase:'Returning to neutral'},
  {p:100, ex:210,ey:200, wx:220,wy:260, cue:'', phase:'Neutral (complete)'},
];

// Mirror for left shoulder
function mirrorKF(kf){
  const cx=150; // center x
  return kf.map(f=>({
    ...f,
    ex: cx-(f.ex-cx),
    wx: cx-(f.wx-cx),
  }));
}
const SHOULDER_L_KF = mirrorKF(SHOULDER_R_KF);

// ═══════════════════════════════════════════════════
// INTERPOLATION
// ═══════════════════════════════════════════════════
function lerp(a,b,t){return a+(b-a)*t}

function interpKF(kfArray, pct){
  // Find surrounding keyframes
  let lo=kfArray[0], hi=kfArray[kfArray.length-1];
  for(let i=0;i<kfArray.length-1;i++){
    if(pct>=kfArray[i].p && pct<=kfArray[i+1].p){
      lo=kfArray[i]; hi=kfArray[i+1]; break;
    }
  }
  if(lo.p===hi.p)return {...lo};
  const t=(pct-lo.p)/(hi.p-lo.p);
  // Smooth easing
  const ts=t*t*(3-2*t); // smoothstep
  const result={};
  for(const key of Object.keys(lo)){
    if(key==='cue'||key==='phase')continue;
    if(typeof lo[key]==='number'){
      result[key]=lerp(lo[key],hi[key],ts);
    }
  }
  // Cue: pick whichever is closer
  result.cue = t<0.5 ? lo.cue : hi.cue;
  result.phase = t<0.5 ? lo.phase : hi.phase;
  return result;
}

// ═══════════════════════════════════════════════════
// UPDATE FIGURE
// ═══════════════════════════════════════════════════
function updateFigure(pct){
  if(!currentJoint)return;
  const svg=document.getElementById('figureSvg');
  if(!svg)return;

  if(currentJoint==='neck'){
    const f=interpKF(NECK_KF, pct);
    const headCx=150+f.hx, headCy=80+f.hy;
    const neckTopX=150+f.ntx, neckTopY=95+f.nty;
    svg.querySelector('#head').setAttribute('cx',headCx);
    svg.querySelector('#head').setAttribute('cy',headCy);
    svg.querySelector('#neckLine').setAttribute('x2',neckTopX);
    svg.querySelector('#neckLine').setAttribute('y2',neckTopY);
    svg.querySelector('#dotNeck').setAttribute('cx',neckTopX);
    svg.querySelector('#dotNeck').setAttribute('cy',neckTopY);
    showCue(f.cue);
    showPhase(f.phase);
  }

  if(currentJoint==='shoulder_r'){
    const f=interpKF(SHOULDER_R_KF, pct);
    svg.querySelector('#armRU').setAttribute('x2',f.ex);
    svg.querySelector('#armRU').setAttribute('y2',f.ey);
    svg.querySelector('#armRL').setAttribute('x1',f.ex);
    svg.querySelector('#armRL').setAttribute('y1',f.ey);
    svg.querySelector('#armRL').setAttribute('x2',f.wx);
    svg.querySelector('#armRL').setAttribute('y2',f.wy);
    showCue(f.cue);
    showPhase(f.phase);
  }

  if(currentJoint==='shoulder_l'){
    const f=interpKF(SHOULDER_L_KF, pct);
    svg.querySelector('#armLU').setAttribute('x2',f.ex);
    svg.querySelector('#armLU').setAttribute('y2',f.ey);
    svg.querySelector('#armLL').setAttribute('x1',f.ex);
    svg.querySelector('#armLL').setAttribute('y1',f.ey);
    svg.querySelector('#armLL').setAttribute('x2',f.wx);
    svg.querySelector('#armLL').setAttribute('y2',f.wy);
    showCue(f.cue);
    showPhase(f.phase);
  }
}

let lastCue='';
function showCue(text){
  const el=document.getElementById('cueOverlay');
  if(text && text!==lastCue){el.textContent=text;el.classList.add('show');lastCue=text}
  else if(!text){el.classList.remove('show');lastCue=''}
}
function showPhase(text){
  document.getElementById('phaseLabel').textContent=text||'';
}

// ═══════════════════════════════════════════════════
// SLIDER
// ═══════════════════════════════════════════════════
const slider=document.getElementById('slider');
slider.addEventListener('input',e=>{
  const v=parseFloat(e.target.value);
  updateFigure(v);
  if(isPlaying){stopPlay()}
});

// ═══════════════════════════════════════════════════
// PLAY / PAUSE
// ═══════════════════════════════════════════════════
function togglePlay(){
  if(isPlaying)stopPlay(); else startPlay();
}
function startPlay(){
  isPlaying=true;
  document.getElementById('playBtn').textContent='⏸';
  playFrom=parseFloat(slider.value);
  playStart=performance.now();
  playLoop();
}
function stopPlay(){
  isPlaying=false;
  document.getElementById('playBtn').textContent='▶';
  if(playRAF)cancelAnimationFrame(playRAF);
  playRAF=null;
}
function playLoop(ts){
  if(!isPlaying)return;
  if(!playStart)playStart=ts;
  const elapsed=(ts-playStart)*playSpeed;
  const dur=PLAY_DURATION_MS;
  let pct=playFrom+(elapsed/dur)*100;
  if(pct>=100){pct=100;stopPlay()}
  slider.value=pct;
  updateFigure(pct);
  if(isPlaying)playRAF=requestAnimationFrame(playLoop);
}
function toggleSpeed(){
  playSpeed=playSpeed===1?0.5:1;
  document.getElementById('speedBtn').textContent=playSpeed===1?'1×':'0.5×';
  document.getElementById('speedBtn').classList.toggle('active',playSpeed!==1);
  // Reset timing
  if(isPlaying){playFrom=parseFloat(slider.value);playStart=performance.now()}
}

// ═══════════════════════════════════════════════════
// MARKERS
// ═══════════════════════════════════════════════════
function addMarker(){
  const pos=parseFloat(slider.value);
  currentMarkers.push({pos,type:'unclassified',ts:Date.now()});
  saveMarkers();
  renderMarkerDots();
  updateSummaryBtnVisibility();
  // Open classify
  classifyingIdx=currentMarkers.length-1;
  openClassify();
}

function renderMarkerDots(){
  const layer=document.getElementById('markersLayer');
  layer.innerHTML='';
  currentMarkers.forEach((m,i)=>{
    const dot=document.createElement('div');
    dot.className='marker-dot '+m.type;
    dot.style.left=m.pos+'%';
    dot.onclick=(e)=>{e.stopPropagation();classifyingIdx=i;openClassify()};
    layer.appendChild(dot);
  });
}

function openClassify(){
  document.getElementById('classifyPopup').classList.add('show');
  document.getElementById('popupOverlay').classList.add('show');
}
function closeClassify(){
  document.getElementById('classifyPopup').classList.remove('show');
  document.getElementById('popupOverlay').classList.remove('show');
}
function classifyMarker(type){
  if(classifyingIdx<0||classifyingIdx>=currentMarkers.length){closeClassify();return}
  if(type==='delete'){
    currentMarkers.splice(classifyingIdx,1);
  }else{
    currentMarkers[classifyingIdx].type=type;
  }
  saveMarkers();
  renderMarkerDots();
  updateSummaryBtnVisibility();
  closeClassify();
}

function updateSummaryBtnVisibility(){
  document.getElementById('summaryBtn').style.display=currentMarkers.length>0?'block':'none';
}

// ═══════════════════════════════════════════════════
// LOCAL STORAGE
// ═══════════════════════════════════════════════════
function saveMarkers(){
  if(!currentJoint)return;
  localStorage.setItem('cars_markers_'+currentJoint, JSON.stringify(currentMarkers));
}
function loadMarkers(jointId){
  try{return JSON.parse(localStorage.getItem('cars_markers_'+jointId)||'[]')}catch(e){return[]}
}
function clearMarkers(){
  currentMarkers=[];
  saveMarkers();
  renderMarkerDots();
  updateSummaryBtnVisibility();
  showScreen('exercise');
  screenStack.push('exercise');
}

// ═══════════════════════════════════════════════════
// SUMMARY
// ═══════════════════════════════════════════════════
function showSummary(){
  showScreen('summary');
  screenStack.push('summary');
  const jName=JOINTS.find(j=>j.id===currentJoint)?.name||currentJoint;
  document.getElementById('summaryTitle').textContent=jName+' — Assessment';

  // Draw arc
  const wrap=document.getElementById('summaryCircle');
  const size=220, cx=110, cy=110, r=85;
  let svgH=`<svg viewBox="0 0 ${size} ${size}">`;
  svgH+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="4"/>`;
  // Draw markers on the arc
  currentMarkers.forEach(m=>{
    const angle = (m.pos/100)*2*Math.PI - Math.PI/2;
    const mx=cx+r*Math.cos(angle), my=cy+r*Math.sin(angle);
    const col={pain:'#e74c3c',restriction:'#f39c12',clicking:'#f1c40f',weakness:'#3498db',other:'#888',unclassified:'#888'}[m.type]||'#888';
    svgH+=`<circle cx="${mx}" cy="${my}" r="7" fill="${col}" stroke="#fff" stroke-width="1.5"/>`;
  });
  // Center label
  svgH+=`<text x="${cx}" y="${cy}" text-anchor="middle" fill="#fff" font-size="12" dy=".3em">${currentMarkers.length} marker${currentMarkers.length!==1?'s':''}</text>`;
  svgH+=`</svg>`;
  wrap.innerHTML=svgH;

  // List
  const list=document.getElementById('summaryList');
  list.innerHTML='';
  const sorted=[...currentMarkers].sort((a,b)=>a.pos-b.pos);
  sorted.forEach(m=>{
    const posLabel=Math.round(m.pos)+'%';
    const phaseLabel=getPhaseForPos(m.pos);
    const div=document.createElement('div');
    div.className='summary-marker-item '+m.type;
    div.innerHTML=`
      <div class="pos">${posLabel} through rotation — ${phaseLabel}</div>
      <div class="type">${m.type}</div>
      <div class="exercise">Exercises for ${jName} at ${phaseLabel} — coming soon</div>
    `;
    list.appendChild(div);
  });
}

function getPhaseForPos(pos){
  if(!currentJoint)return'';
  let kf=[];
  if(currentJoint==='neck')kf=NECK_KF;
  if(currentJoint==='shoulder_r')kf=SHOULDER_R_KF;
  if(currentJoint==='shoulder_l')kf=SHOULDER_L_KF;
  const f=interpKF(kf,pos);
  return f.phase||'Unknown phase';
}

// ═══════════════════════════════════════════════════
// SAVE ASSESSMENT
// ═══════════════════════════════════════════════════
function saveAssessment(){
  const h=JSON.parse(localStorage.getItem('cars_history')||'[]');
  h.push({joint:currentJoint,markers:[...currentMarkers],ts:Date.now()});
  localStorage.setItem('cars_history',JSON.stringify(h));
  // Clear working markers
  currentMarkers=[];
  saveMarkers();
  alert('Assessment saved!');
  if(fullAssessmentMode){
    const available=JOINTS.filter(j=>j.hasAnim);
    fullAssessmentIdx++;
    if(fullAssessmentIdx<available.length){
      openJoint(available[fullAssessmentIdx].id);
      return;
    }else{
      fullAssessmentMode=false;
    }
  }
  showScreen('home');
}

// ═══════════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════════
function loadHistory(){
  const list=document.getElementById('historyList');
  const h=JSON.parse(localStorage.getItem('cars_history')||'[]').sort((a,b)=>b.ts-a.ts);
  if(!h.length){list.innerHTML='<div class="no-history">No assessments saved yet.</div>';return}
  list.innerHTML='';
  h.forEach(item=>{
    const jName=JOINTS.find(j=>j.id===item.joint)?.name||item.joint;
    const d=new Date(item.ts);
    const dateStr=d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    const div=document.createElement('div');
    div.className='history-item';
    div.innerHTML=`
      <div><div class="hi-joint">${jName}</div><div class="hi-date">${dateStr}</div></div>
      <div class="hi-count">${item.markers.length} marker${item.markers.length!==1?'s':''}</div>
    `;
    list.appendChild(div);
  });
}
